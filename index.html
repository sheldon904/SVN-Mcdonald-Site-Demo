<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SVN McDonald &amp; Company is Central Florida's premier commercial and land real estate brokerage in Ocala, FL. National reach, local expertise." />

    <!-- Preconnect hints (max 3 critical origins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://svnmcdonald.com">

    <!-- DNS Prefetch for secondary origins -->
    <link rel="dns-prefetch" href="https://svnmcdonald.com">
    <link rel="dns-prefetch" href="https://buildout.com">
    <link rel="dns-prefetch" href="https://assets.buildout.com">
    <link rel="dns-prefetch" href="https://site-editor.buildout.com">

    <!-- Preload hero image -->
    <link rel="preload" href="https://svnmcdonald.com/wp-content/uploads/2024/10/Hwy-484-Ocala-1920x1073.jpg" as="image" fetchpriority="high">

    <!-- Preload critical font file to skip CSS chain -->
    <link rel="preload" href="https://fonts.gstatic.com/s/montserrat/v31/JTUSjIg1_i6t8kCHKm459WRhyzbi.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Non-render-blocking font CSS -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>

    <title>SVN McDonald & Company | Land & Commercial Real Estate</title>

    <!-- Inline critical CSS for instant first paint -->
    <style>
      @font-face {
        font-family: 'Montserrat';
        font-style: normal;
        font-weight: 400 800;
        font-display: swap;
        src: url('https://fonts.gstatic.com/s/montserrat/v31/JTUSjIg1_i6t8kCHKm459WRhyzbi.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      body { margin: 0; font-family: 'Montserrat', ui-sans-serif, system-ui, sans-serif; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
